version: "1"
services:
- type: web
  name: nimble-backend
  runtime: python
  repo: https://github.com/kabin007/nimble-backend
  plan: free
  envVars:
  - key: JWT_SECRET
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: CSRF_TRUSTED_ORIGINS
    sync: false
  - key: ALLOWED_HOSTS
    sync: false
  - key: SECRET_KEY
    sync: false
  - key: DEBUG
    sync: false
  region: oregon
  buildCommand: pip install -r requirements.txt && python manage.py migrate
  startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
  autoDeployTrigger: commit
  rootDir: ./
